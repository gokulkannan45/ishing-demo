<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XENON INTELLIGENCE</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Inter,sans-serif;
background:#020503;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

/* Animated Background */

body::before{
content:"";
position:absolute;
inset:0;
background:
radial-gradient(circle at center,rgba(0,255,120,.08),transparent 45%),
linear-gradient(rgba(0,255,120,.04) 1px,transparent 1px),
linear-gradient(90deg,rgba(0,255,120,.04) 1px,transparent 1px);
background-size:100% 100%,45px 45px,45px 45px;
animation:gridMove 18s linear infinite;
}

@keyframes gridMove{
0%{transform:translateY(0);}
100%{transform:translateY(45px);}
}

/* Radar */

.radar{
position:absolute;
width:900px;
height:900px;
border-radius:50%;
border:1px solid rgba(0,255,120,.08);
animation:rotate 18s linear infinite;
}

.radar::before{
content:"";
position:absolute;
inset:0;
border-radius:50%;
background:conic-gradient(from 0deg,
transparent,
rgba(0,255,120,.25),
transparent 25%);
animation:rotate 5s linear infinite;
filter:blur(6px);
}

.ring{
position:absolute;
border-radius:50%;
border:1px solid rgba(0,255,120,.08);
animation:rotateReverse 24s linear infinite;
}

.r1{width:600px;height:600px;}
.r2{width:760px;height:760px;}
.r3{width:980px;height:980px;}

@keyframes rotate{
100%{transform:rotate(360deg);}
}

@keyframes rotateReverse{
100%{transform:rotate(-360deg);}
}

/* Floating Particles */

.particle{
position:absolute;
width:3px;
height:3px;
background:#00ff88;
border-radius:50%;
box-shadow:0 0 12px #00ff88;
animation:float linear infinite;
opacity:.8;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:0;
}
20%{opacity:1;}
80%{opacity:1;}
100%{
transform:translateY(-120vh);
opacity:0;
}
}

/* Binary */

.binary{
position:absolute;
font-family:monospace;
font-size:13px;
color:#00ff88;
opacity:.08;
white-space:nowrap;
animation:fall linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-120%);
}
100%{
transform:translateY(120vh);
}
}

/* Card */

.card{

position:relative;
z-index:10;
width:520px;
padding:45px;
border-radius:24px;

background:
linear-gradient(135deg,
rgba(255,255,255,.05),
rgba(255,255,255,.01));

backdrop-filter:blur(18px);

border:1px solid rgba(0,255,120,.25);

box-shadow:

0 0 30px rgba(0,255,120,.18),

0 0 120px rgba(0,255,120,.08),

inset 0 0 30px rgba(255,255,255,.03);

animation:cardFloat 5s ease-in-out infinite;
}

@keyframes cardFloat{

50%{
transform:translateY(-8px);
}

}

/* Reflection */

.card::before{
content:"";
position:absolute;
left:-60%;
top:0;
width:40%;
height:100%;
background:linear-gradient(90deg,
transparent,
rgba(255,255,255,.08),
transparent);
transform:skewX(-25deg);
animation:shine 7s infinite;
}

@keyframes shine{

100%{
left:160%;
}

}

.logo{

font-family:Orbitron;
font-size:34px;
font-weight:800;
text-align:center;
letter-spacing:3px;
color:#00ff88;
text-shadow:0 0 18px #00ff88;

}

.subtitle{

text-align:center;
margin-top:10px;
letter-spacing:4px;
font-size:13px;
color:#8bffc4;

}

.secret{

margin:28px 0;

text-align:center;

font-size:20px;

font-family:Orbitron;

}

.info{

display:flex;

justify-content:space-between;

margin-bottom:28px;

font-size:13px;

color:#70ffb0;

}

input{

width:100%;

padding:18px;

background:rgba(0,0,0,.55);

border:1px solid rgba(0,255,120,.3);

border-radius:14px;

color:#00ff88;

font-size:16px;

outline:none;

transition:.4s;

}

input:focus{

border-color:#00ff88;

box-shadow:

0 0 25px rgba(0,255,120,.35),

inset 0 0 15px rgba(0,255,120,.08);

}

button{

margin-top:18px;

width:100%;

padding:18px;

background:linear-gradient(90deg,#00ff88,#00d96b);

border:none;

border-radius:14px;

font-family:Orbitron;

font-size:15px;

cursor:pointer;

transition:.35s;

}

button:hover{

transform:translateY(-3px);

box-shadow:0 0 25px #00ff88;

}

button:active{

transform:scale(.98);

}

.status{

margin-top:30px;

display:grid;

grid-template-columns:1fr 1fr;

gap:12px;

}

.box{

padding:12px;

border-radius:12px;

background:rgba(255,255,255,.03);

border:1px solid rgba(0,255,120,.12);

font-size:12px;

color:#8dffc9;

}

.led{

display:inline-block;

width:9px;

height:9px;

background:#00ff88;

border-radius:50%;

box-shadow:0 0 12px #00ff88;

margin-right:8px;

animation:blink 2s infinite;

}

@keyframes blink{

50%{

opacity:.3;

}

}

.loading{

display:none;

margin-top:25px;

}

.message{

text-align:center;

font-size:15px;

color:#9effcb;

height:25px;

transition:.5s;

}

.bar{

margin-top:12px;

height:10px;

background:#111;

border-radius:20px;

overflow:hidden;

}

.progress{

height:100%;

width:0%;

background:linear-gradient(90deg,#00ff88,#5dffb3);

transition:.8s;

}

.footer{

margin-top:28px;

text-align:center;

font-size:11px;

color:#5bb686;

letter-spacing:2px;

}

</style>

</head>

<body>

<div class="radar"></div>
<div class="ring r1"></div>
<div class="ring r2"></div>
<div class="ring r3"></div>

<div class="card">

<div class="logo">
XENON INTELLIGENCE
</div>

<div class="subtitle">
XENON SECURE NETWORK
</div>

<div class="secret">
TOP SECRET ACCESS
</div>

<div class="info">
<div>OMEGA LEVEL</div>
<div>XSN v1.0</div>
</div>

<input type="password" id="password" placeholder="ENTER SECURITY PASSPHRASE">

<button onclick="login()">
ACCESS SECURE NETWORK
</button>

<div class="loading" id="loading">

<div class="message" id="message">
Authenticating...
</div>

<div class="bar">

<div class="progress" id="progress"></div>

</div>

</div>

<div class="status">

<div class="box">
<span class="led"></span>ENCRYPTION ACTIVE
</div>

<div class="box">
<span class="led"></span>NETWORK ONLINE
</div>

<div class="box">
<span class="led"></span>OMEGA CLEARANCE
</div>

<div class="box">
<span class="led"></span>AI DEFENSE READY
</div>

</div>

<div class="footer">
© XENON INTELLIGENCE • FICTIONAL INTERFACE
</div>

</div>

<script>

/* Binary */

for(let i=0;i<60;i++){

let b=document.createElement("div");

b.className="binary";

b.innerHTML=Math.random()>0.5?"010101101010101":"AF 91 C3 44 7D";

b.style.left=Math.random()*100+"%";

b.style.animationDuration=(8+Math.random()*10)+"s";

b.style.animationDelay=Math.random()*8+"s";

document.body.appendChild(b);

}

/* Particles */

for(let i=0;i<80;i++){

let p=document.createElement("div");

p.className="particle";

p.style.left=Math.random()*100+"vw";

p.style.animationDuration=(8+Math.random()*8)+"s";

p.style.animationDelay=Math.random()*8+"s";

document.body.appendChild(p);

}

/* Login */

function login(){

const load=document.getElementById("loading");

const msg=document.getElementById("message");

const bar=document.getElementById("progress");

load.style.display="block";

const steps=[

"Password Accepted",

"Authenticating...",

"Connecting Secure Tunnel...",

"Verifying Credentials...",

"Synchronizing...",

"Initializing Workspace...",

"Loading Interface..."

];

let i=0;

const timer=setInterval(()=>{

msg.style.opacity=0;

setTimeout(()=>{

msg.innerHTML=steps[i];

msg.style.opacity=1;

},250);

bar.style.width=((i+1)/steps.length*100)+"%";

i++;

if(i>=steps.length){

clearInterval(timer);

setTimeout(()=>{

document.body.innerHTML=`
<div style="
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#020503;
font-family:Orbitron;
color:#00ff88;
flex-direction:column;
">

<h1 style="font-size:60px;text-shadow:0 0 25px #00ff88;">
ACCESS GRANTED
</h1>

<p style="margin-top:20px;color:#9affca;letter-spacing:3px;">
WELCOME AGENT
</p>

<p style="margin-top:15px;color:#66d79d;">
Workspace will be added in Phase 2
</p>

</div>
`;

},700);

}

},700);

}

/* Mouse Parallax */

document.addEventListener("mousemove",(e)=>{

const x=(e.clientX/window.innerWidth-.5)*20;

const y=(e.clientY/window.innerHeight-.5)*20;

document.querySelector(".card").style.transform=
`rotateY(${x/4}deg) rotateX(${-y/4}deg)`;

});

</script>

</body>
</html>
